name: Spiel manuell bauen

# Dadurch wird der manuelle Startknopf aktiviert
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-Bindoj:
    runs-on: windows-latest
    
    # Hier werden die minimalen Rechte für diesen Job festgelegt
    permissions:
      contents: read
      
    steps:
      - name: Code herunterladen
        uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.5'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install setuptools panda3d deploy-libs

      - name: Spiel mit Panda3D-Build bauen
        run: python setup.py build_apps

      - name: Fertiges Spiel speichern
        uses: actions/upload-artifact@v4
        with:
          name: Spiel-Bindoj-Build
          path: build/win_amd64/
